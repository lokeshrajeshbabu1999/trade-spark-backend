version: '3.8'

services:
  db:
    image: postgres:16
    container_name: trade-spark-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-tradespark}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: trade-spark-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-tradespark}
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
